apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-controller
rules:
  - apiGroups: ["kro.run"]
    resources: ["kubernetes", "kubernetes/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["cluster.x-k8s.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-controller
subjects:
  - kind: ServiceAccount
    name: kubernetes-controller
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-controller
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-controller
  template:
    metadata:
      labels:
        app: kubernetes-controller
    spec:
      serviceAccountName: kubernetes-controller
      containers:
        - name: controller
          image: ko://github.com/s-urbaniak/dbaas/cmd/kubernetes-controller
          args:
            - --leader-elect=false
            - --kcp-kubeconfig=/etc/kcp/kubeconfig
            - --proxy-base-url=http://kubernetes-controller.default.svc.cluster.local:8080
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: metrics
          volumeMounts:
            - name: kcp-kubeconfig
              mountPath: /etc/kcp
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: kcp-kubeconfig
          secret:
            secretName: kcp-admin-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: kubernetes-controller
  namespace: default
spec:
  selector:
    app: kubernetes-controller
  ports:
    - port: 8080
      targetPort: http
      name: http
