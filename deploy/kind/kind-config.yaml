kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  extraPortMappings:
  # KCP front-proxy — host:6443 → NodePort 30443 → pod:8443
  - containerPort: 30443
    hostPort: 6443
    protocol: TCP
  # DBaaS provisioner UI — host:8090 → NodePort 30090 → pod:8090
  - containerPort: 30090
    hostPort: 8090
    protocol: TCP
