# KCP Helm values for a local kind/minikube cluster.
# Ref: https://kcp-dev.github.io/helm-charts

# Required: hostname used in TLS SANs and workspace URLs.
# For local dev we use localhost and port-forward to reach the front-proxy.
externalHostname: localhost
# Must be a string: the chart template uses `eq .Values.externalPort ""` to check
# for an empty value, which fails with a type error if the value is an integer.
externalPort: "6443"

kcpFrontProxy:
  service:
    # NodePort with a pinned port so kind's extraPortMappings can forward
    # host:6443 → container:30443 → pod:8443 without a port-forward.
    type: NodePort
    nodePort: 30443
  # Add the in-cluster service hostname to the front-proxy TLS cert SANs so that
  # components running inside the cluster (e.g. the sync agent) can verify TLS
  # without skipping verification.
  extraDNSNames:
    - kcp-front-proxy.kcp.svc.cluster.local

etcd:
  # Persistent storage for the embedded etcd.
  persistence:
    enabled: true
    size: 2Gi
    # storageClassName: standard   # uncomment and set if your cluster needs a specific class

kcp:
  # Self-signed TLS — acceptable for local dev.
  tls:
    selfSigned: true

  # Single replica is fine for local dev.
  replicaCount: 1

  # Use a repo-managed kubeconfig that reaches the front-proxy through the
  # in-cluster Service for workspace initialization instead of the chart's
  # external localhost-based kubeconfig.
  externalLogicalClusterAdminFlag: false
  extraFlags:
    - --feature-gates=WorkspaceMounts=true
    # Publish APIExport virtual workspace endpoints through the in-cluster
    # front-proxy so in-cluster consumers like the sync-agent can authenticate
    # against the correct hop instead of talking to the shard directly.
    - --shard-virtual-workspace-url=https://kcp-front-proxy.kcp.svc.cluster.local:8443
    - --external-logical-cluster-admin-kubeconfig=/etc/kcp/external-logical-cluster-admin-service/kubeconfig
  extraVolumes:
    - name: external-logical-cluster-admin-service-kubeconfig
      secret:
        secretName: kcp-external-admin-kubeconfig-service
  extraVolumeMounts:
    - name: external-logical-cluster-admin-service-kubeconfig
      mountPath: /etc/kcp/external-logical-cluster-admin-service
      readOnly: true
