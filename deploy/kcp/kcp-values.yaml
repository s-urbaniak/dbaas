# KCP Helm values for a local kind/minikube cluster.
# Ref: https://kcp-dev.github.io/helm-charts

# Required: hostname used in TLS SANs and workspace URLs.
# For local dev we use localhost and port-forward to reach the front-proxy.
externalHostname: localhost
# Must be a string: the chart template uses `eq .Values.externalPort ""` to check
# for an empty value, which fails with a type error if the value is an integer.
externalPort: "6443"

kcpFrontProxy:
  service:
    # NodePort with a pinned port so kind's extraPortMappings can forward
    # host:6443 → container:30443 → pod:8443 without a port-forward.
    type: NodePort
    nodePort: 30443
  # Add the in-cluster service hostname to the front-proxy TLS cert SANs so that
  # components running inside the cluster (e.g. the sync agent) can verify TLS
  # without skipping verification.
  extraDNSNames:
    - kcp-front-proxy.kcp.svc.cluster.local

etcd:
  # Persistent storage for the embedded etcd.
  persistence:
    enabled: true
    size: 2Gi
    # storageClassName: standard   # uncomment and set if your cluster needs a specific class

kcp:
  # Self-signed TLS — acceptable for local dev.
  tls:
    selfSigned: true

  # Single replica is fine for local dev.
  replicaCount: 1
