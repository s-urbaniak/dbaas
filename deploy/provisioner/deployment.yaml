apiVersion: v1
kind: ServiceAccount
metadata:
  name: dbaas-provisioner
  namespace: default
---
# The provisioner reads workspaces in root:consumers and creates child workspaces + APIBindings.
# It needs no permissions in the physical cluster; it talks to KCP via the mounted kubeconfig.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dbaas-provisioner
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dbaas-provisioner
  template:
    metadata:
      labels:
        app: dbaas-provisioner
    spec:
      serviceAccountName: dbaas-provisioner
      containers:
        - name: provisioner
          image: ko://github.com/s-urbaniak/dbaas/cmd/provisioner
          args:
            - --kubeconfig=/etc/kcp/kubeconfig
            - --addr=:8090
          ports:
            - containerPort: 8090
              name: http
          volumeMounts:
            - name: kcp-kubeconfig
              mountPath: /etc/kcp
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: kcp-kubeconfig
          secret:
            # Create this secret after KCP is installed:
            # kubectl create secret generic kcp-admin-kubeconfig \
            #   --from-file=kubeconfig=<path-to-kcp-admin.kubeconfig>
            secretName: kcp-admin-kubeconfig
---
apiVersion: v1
kind: Service
metadata:
  name: dbaas-provisioner
  namespace: default
spec:
  type: NodePort
  selector:
    app: dbaas-provisioner
  ports:
    - port: 8090
      targetPort: http
      nodePort: 30090
      name: http
