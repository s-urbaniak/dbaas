# Extra RBAC for the sync agent to manage Database instances.
# kro v0.9.0 creates all CRDs in the kro.run group regardless of the RGD name.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: api-syncagent-database
rules:
  - apiGroups: ["kro.run"]
    resources: ["databases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kro.run"]
    resources: ["databases/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["kro.run"]
    resources: ["kubernetes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kro.run"]
    resources: ["kubernetes/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-syncagent-database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: api-syncagent-database
subjects:
  - kind: ServiceAccount
    name: api-syncagent-mongodb
    namespace: kcp
  - kind: ServiceAccount
    name: api-syncagent-kubernetes
    namespace: kcp-kubernetes
