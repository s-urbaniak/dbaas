apiVersion: v1
kind: ServiceAccount
metadata:
  name: mock-flexcluster
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mock-flexcluster
rules:
  - apiGroups: ["atlas.generated.mongodb.com"]
    resources: ["flexclusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["atlas.generated.mongodb.com"]
    resources: ["flexclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mock-flexcluster
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mock-flexcluster
subjects:
  - kind: ServiceAccount
    name: mock-flexcluster
    namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-flexcluster
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-flexcluster
  template:
    metadata:
      labels:
        app: mock-flexcluster
    spec:
      serviceAccountName: mock-flexcluster
      containers:
        - name: controller
          image: ko://github.com/s-urbaniak/dbaas/cmd/mock-flexcluster
          args:
            - --leader-elect=false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
