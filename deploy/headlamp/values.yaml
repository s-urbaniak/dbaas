# Headlamp Helm values for the DBaaS local kind cluster.
# Ref: https://headlamp.dev/docs/latest/installation/in-cluster/

replicaCount: 1

service:
  type: NodePort
  nodePort: 30466

config:
  # Pass the workspace kubeconfig via -kubeconfig flag.
  # Each kubeconfig context appears as a separate cluster in the Cluster Chooser.
  extraArgs:
    - -kubeconfig=/kubeconfigs/config

volumeMounts:
  - name: workspace-kubeconfig
    mountPath: /kubeconfigs
    readOnly: true
  - name: kcp-plugin
    mountPath: /headlamp/plugins/kcp
    readOnly: true

volumes:
  - name: workspace-kubeconfig
    secret:
      secretName: headlamp-workspace-kubeconfig
  - name: kcp-plugin
    configMap:
      name: headlamp-kcp-plugin
