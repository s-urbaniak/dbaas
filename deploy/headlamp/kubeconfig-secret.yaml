apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
---
# Initial empty kubeconfig for Headlamp. The dbaas-provisioner adds and removes
# workspace contexts here as workspaces are created and deleted.
apiVersion: v1
kind: Secret
metadata:
  name: headlamp-workspace-kubeconfig
  namespace: headlamp
type: Opaque
stringData:
  config: |
    apiVersion: v1
    kind: Config
    clusters: []
    contexts: []
    users: []
    current-context: ""
    preferences: {}
