# kro ResourceGraphDefinition for MongoDBDatabase.
#
# kro reads this and:
#   1. Auto-generates the CRD  dbaas.mongodb.com/v1alpha1 MongoDBDatabase
#   2. Runs a dedicated microcontroller that, on each MongoDBDatabase instance:
#      - Creates a mongodb.com/v1 MongoDB child  (provider=ON-PREMISE)
#      - Creates an atlas FlexCluster child       (provider=AWS or AZURE)
#
# Status is derived from spec input to avoid CEL null-reference issues when
# referencing conditionally excluded child resources.
# A production version would aggregate real status from mckMongoDB / atlasFlexCluster.
#
# Ref: https://kro.run/docs/concepts/
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: mongodatabases.dbaas.mongodb.com
spec:
  schema:
    apiVersion: v1alpha1
    kind: MongoDBDatabase
    spec:
      provider: string
      region: string
      version: string
      members: integer
      storage: string
    status:
      # kro schema format: 'fieldname: ${CEL}' to populate at runtime from child
      # resources. status CEL can only reference child resource IDs (not instance.*).
      state: '${mckMongoDB.status.phase}'
      connectionString: '${mckMongoDB.status.phase == "Running" ? "mongodb://" + mckMongoDB.metadata.name + "." + mckMongoDB.metadata.namespace + ".svc:27017" : ""}'

  resources:
    # ── ON-PREMISE branch ───────────────────────────────────────────────────
    # kro v0.9.0 cannot use schema.spec.* in includeWhen (type resolver bug),
    # so both child resources are always created regardless of provider.
    - id: mckMongoDB
      template:
        apiVersion: mongodb.com/v1
        kind: MongoDB
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          type: ReplicaSet
          persistent: true

    # ── CLOUD branch (AWS / AZURE → Atlas FlexCluster) ──────────────────────
    - id: atlasFlexCluster
      template:
        apiVersion: atlas.generated.mongodb.com/v1
        kind: FlexCluster
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          v20250312:
            entry:
              name: ${schema.metadata.name}
              providerSettings:
                # kro v0.9.0 cannot pass schema.spec.* fields to child resources
                # with strict OpenAPI CRDs (type resolver bug). Hardcoded for mock.
                backingProviderName: AWS
                regionName: US_EAST_1

