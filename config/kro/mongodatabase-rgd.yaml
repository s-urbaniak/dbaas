# kro ResourceGraphDefinition for MongoDBDatabase.
#
# kro reads this and:
#   1. Auto-generates the CRD  dbaas.mongodb.com/v1alpha1 MongoDBDatabase
#   2. Runs a dedicated microcontroller that, on each MongoDBDatabase instance:
#      - Creates a mongodb.com/v1 MongoDB child  (provider=ON-PREMISE)
#      - Creates an atlas FlexCluster child       (provider=AWS or AZURE)
#
# Ref: https://kro.run/docs/concepts/
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: mongodatabases.dbaas.mongodb.com
spec:
  schema:
    apiVersion: v1alpha1
    kind: MongoDBDatabase
    spec:
      provider: 'string | enum="ON-PREMISE,AWS,AZURE" description="Backing MongoDB provider to provision for this database."'
      region: 'string | description="Target cloud region for Atlas-backed databases."'
      version: 'string | description="Requested MongoDB version for the provisioned database."'
      members: 'integer | minimum=1 description="Requested replica set member count for the database."'
      storage: 'string | description="Requested storage tier or size for the provisioned database."'
    status:
      # NOTE: Status CEL can only reference child resource IDs (not instance.*).
      # Referencing a resource excluded by includeWhen causes a nil-ref error
      # (kro issue #509, still open). For now only the ON-PREMISE branch is
      # surfaced; atlasFlexCluster.status.v20250312.connectionStrings.standardSrv
      # is set by the controller but cannot be copied here yet.
      state: '${mckMongoDB.status.phase}'
      connectionString: '${mckMongoDB.status.connectionString}'

  resources:
    # ── ON-PREMISE branch ───────────────────────────────────────────────────
    - id: mckMongoDB
      includeWhen:
        - ${schema.spec.provider == "ON-PREMISE"}
      template:
        apiVersion: mongodb.com/v1
        kind: MongoDB
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          type: ReplicaSet
          version: "7.0.0"
          credentials: mock-credentials
          persistent: true

    # ── CLOUD branch (AWS / AZURE → Atlas FlexCluster) ──────────────────────
    - id: atlasFlexCluster
      includeWhen:
        - ${schema.spec.provider == "AWS" || schema.spec.provider == "AZURE"}
      template:
        apiVersion: atlas.generated.mongodb.com/v1
        kind: FlexCluster
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          v20250312:
            groupRef:
              name: mock-group
            entry:
              name: ${schema.metadata.name}
              providerSettings:
                backingProviderName: ${schema.spec.provider}
                regionName: ${schema.spec.region}
