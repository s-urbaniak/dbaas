# PublishedResource tells the kcp API Sync Agent to:
# 1. Expose the MongoDBDatabase CRD as an APIExport in the root:dbaas-provider workspace.
# 2. Sync MongoDBDatabase instances created in kcp workspaces down to the
#    physical cluster where kro and the mock controllers run.
# 3. Propagate status changes back up to the kcp workspace.
#
# Field names match syncagent.kcp.io/v1alpha1 schema:
#   spec.resource.apiGroup + kind  (not group/resource)
#   status back-sync is always enabled — no statusBackSync field.
#
# Ref: https://docs.kcp.io/api-syncagent/
apiVersion: syncagent.kcp.io/v1alpha1
kind: PublishedResource
metadata:
  name: mongodatabases
  namespace: kcp
  labels:
    dbaas.mongodb.com/published-resource-group: mongodb
spec:
  resource:
    # kro v0.9.0 always creates CRDs in the kro.run group regardless of the
    # RGD metadata.name — the group cannot be customised via Helm values.
    apiGroup: kro.run
    kind: MongoDBDatabase
    versions:
      - v1alpha1
